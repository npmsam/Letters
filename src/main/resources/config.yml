# Enables or disables the plugin entirely.
# If set to false, the plugin will not register any listeners or send messages.
enabled: true

# This contains all configurable messages handled by the plugin,
# such as join, quit, death, and system messages.
messages:
  # These messages are default for everyone unless overridden
  # by a group-based or player-specific message.
  default:
    # Random message from this list will be sent when a player joins the server.
    # Multiple messages are okay to add here.
    # Available built-in placeholders (no PlaceholderAPI needed): <player>
    join:
      - "<green><player> joined the server"
      - "<green><player> is now online"

    # Random message from this list will be sent when a player quits the server.
    # Multiple messages are okay to add here.
    # Available built-in placeholders (no PlaceholderAPI needed): <player>
    quit:
      - "<red><player> left the server"
      - "<red><player> went offline"

    # Random message from this list will be sent when a player dies.
    # Only one message is used by default, it’s okay to add more.
    # Available built-in placeholders (no PlaceholderAPI needed): <player>, <death_message>
    death:
      - "<red><death_message>"

    # Random message from this list will be used when a player sends a message in chat.
    # Only one format is used by default, it’s okay to add more.
    # Available built-in placeholders (no PlaceholderAPI needed): <player>, <message>
    chat:
      - "<player> <gray>>> <white><message>"

    # Random message from this list will be used when a player earns an advancement.
    # Only one message is used by default, it’s okay to add more.
    # Available built-in placeholders (no PlaceholderAPI needed): <player>, <advancement>
    advancement:
      - "<advancement_color><player> has made the advancement <advancement>"

    # Random message from this list will be shown to the sender.
    # Only one message is used by default, it’s okay to add more.
    # Available built-in placeholders (no PlaceholderAPI needed): <sender>, <recipient>, <message>
    whisper.sender:
      - "<gray>(you) -> <recipient>: <white><message>"

    # Random message from this list will be sent to the recipient.
    # Only one message is used by default, it’s okay to add more.
    # Available built-in placeholders (no PlaceholderAPI needed): <sender>, <recipient>, <message>
    whisper.recipient:
      - "<gray><sender> -> (you): <white><message>"

  # These messages only apply to players in specific groups.
  # Group-based messages have the second-highest priority.
  # The keys under this section must be the exact group names defined in LuckPerms.
  groups:
    # These messages override default messages for players in the admin group in LuckPerms.
    # Only players in the admin group will have these custom messages.
    admin:
      # A random message from this list will be sent when a player in the admin group joins the server.
      # Multiple messages are okay to add here.
      # Available built-in placeholders (no PlaceholderAPI needed): <player>
      join:
        - "<red>Admin <player> has joined the server"
        - "<red>Admin <player> is now online"

  # These messages apply only to specific players.
  # Player-specific messages have the highest priority.
  # The keys under this section must be the exact Minecraft username of the player.
  players:
    # These messages override all others for the player with the username 'Notch'.
    # Only the player with the username 'Notch' will have these custom messages.
    Notch:
      # A random message from this list will be sent when the player with the username 'Notch' joins the server.
      # Multiple messages are okay to add here.
      # Available built-in placeholders (no PlaceholderAPI needed): <player>
      join:
        - "<light_purple>Notch has joined the server"
        - "<light_purple>Notch is now online"

  # System messages used internally by the plugin.
  # These messages are shown in the console or as command feedback,
  # and are not related to gameplay events.
  system:
    # Plugin lifecycle messages.
    lifecycle:
      # Message sent to the console when the plugin is enabled.
      enable: "Enabled Letters v<plugin_version>"

      # Message sent to the console when the plugin is disabling.
      disable: "Disabled Letters v<plugin_version>"

    # Messages related to plugin and config checks
    checks:
      # Message sent to the console when the plugin is disabled.
      plugin-disabled: "Plugin is disabled in config."

      # Message sent when PlaceholderAPI is detected.
      placeholder-api-found: "PlaceholderAPI detected. Extended placeholder support enabled."

      # Message sent when PlaceholderAPI is not detected.
      placeholder-api-not-found: "PlaceholderAPI not found. Some placeholders may not work."

      # Message sent when LuckPerms is detected.
      luck-perms-found: "LuckPerms detected. Group-based message support enabled."

      # Message sent when LuckPerms is not detected.
      luck-perms-not-found: "LuckPerms not found. Group-based messages will not work."

      # Message sent when a supported vanish plugin is detected.
      vanish-plugin-found: "<vanish_plugin> detected. Vanish support enabled."

      # Message sent when a supported vanish plugin is not detected.
      vanish-plugin-not-found: "No supported vanish plugin found. Vanish-related features will not work."

    # Command-related system messages.
    commands:
      # Message sent when the plugin is reloaded.
      reload: "<green>Reloaded Letters v<plugin_version>"

      # Message sent when no subcommand is used.
      no-command: "<red>You must specify a subcommand."

      # Message sent when the player lacks permission.
      no-permission: "<red>You do not have permission to do that."

      # Message sent when an invalid subcommand is used.
      invalid-command: "<red>Unknown command."
