name: Letters
version: '0.0.1'
main: com.sampreet.letters.Letters
api-version: '1.21'
prefix: Letters
authors: [ Sampreet Singh ]
description: Lightweight Minecraft server plugin that lets you fully customize system messages like join, quit, death messages with placeholders, colors, and more.
website: https://github.com/npmsam/Letters
softdepend:
  - PlaceholderAPI
  - LuckPerms
commands:
  # Main command for controlling the plugin
  letters:
    description: The main command for managing the plugin
    usage: /<command> <subcommand>

  # Command that overrides the vanilla /msg, /tell, and /w whisper commands.
  msg:
    description: Command that overrides the vanilla /msg, /tell, and /w whisper commands.
    usage: /<command> <player> <message>
    aliases: [ "tell", "w" ]

permissions:
  # Permission to reload the plugin configuration
  letters.reload:
    description: Allows reloading of the plugin configuration
    default: op

  # Default permission for having custom join messages
  letters.join:
    description: Allows the plugin to change join messages for the player
    default: true

  # Default permission for having custom quit messages
  letters.quit:
    description: Allows the plugin to change quit messages for the player
    default: true

  # Default permission for having custom death messages
  letters.death:
    description: Allows the plugin to change death messages for the player
    default: true

  # Default permission for having custom advancement messages
  letters.advancement:
    description: Allows the plugin to change advancement messages for the player
    default: true

  # Default permission for having custom server chat messages
  letters.chat:
    description: Allows the plugin to change server chat messages for the player
    default: true

  # Default permission for having custom private player-to-player messages (whispers) chat messages
  letters.whisper:
    description: Allows the plugin to change private player-to-player messages (whispers) for the player
    default: true